<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./style.css" type="text/css" />
    <title>Welcome | XYZ University</title>
</head>
<body>
    <div class="container">
        <h1>Welcome to XYZ University 🎓</h1>
        <p class="subtitle">Sign up to the platform to access all important notes & lectures.</p>

        <form action="/addUser" method="POST" id="signupForm">
            <h2>Create Account</h2>

            <div class="field">
                <label for="email">Email</label>
                <input type="email" placeholder="jane@email.com" name="email" required>
            </div>

            <div class="field">    
                <label for="username">Username</label>
                <input type="text" placeholder="Jane Doe" name="username" required>
            </div>

            <div class="field">
                <label for="password">Password</label>
                <input type="password" placeholder="••••••••" name="password" required>
            </div>

            <button id="formBtn">Create Account</button>
        </form>
    </div>
</body>
</html>
